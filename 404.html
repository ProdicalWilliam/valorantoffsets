<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>404 - Page Not Found</title>
<link href="https://fonts.googleapis.com/css?family=Roboto+Mono" rel="stylesheet">
<style>
html, body { font-family: 'Roboto Mono', monospace; font-size: 16px; background: #000; margin: 0; user-select: none; }
*, *:before, *:after { box-sizing: border-box; }
.container { width: 100%; height: 100vh; position: relative; }
.center-xy { top: 50%; left: 50%; transform: translate(-50%,-50%); position: absolute; }
.copy-container { text-align: center; display: inline-block; position: relative; }
p { color: #fff; font-size: 24px; letter-spacing: .2px; margin: 0; display: inline-block; }
.handle { background: #ffe500; width: 14px; height: 30px; position: absolute; top: 50%; left: 0; transform: translateY(-50%); margin-top: 0; pointer-events: none; will-change: transform, opacity; }
</style>
</head>
<body>
<div class="container">
  <div class="center-xy">
    <div class="copy-container">
      <p>404, page not found.</p>
      <span class="handle" aria-hidden="true"></span>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.20.3/TweenMax.min.js"></script>
<script>
var $copyContainer = $(".copy-container"),
    $p = $copyContainer.find('p'),
    $handle = $copyContainer.find('.handle');
var splitTextTimeline = new TimelineMax();
var handleTL = new TimelineMax({repeat:0, yoyo:false});
var tl = new TimelineMax();
tl.add(function(){ animateCopy(); blinkHandle(); }, 0.2);
function animateCopy() {
  splitTextTimeline.from($p, 0.6, {autoAlpha:0, ease:Back.easeOut});
  setTimeout(animateHandle, 500);
}
function blinkHandle() {
  TweenMax.fromTo($handle, 0.4, {autoAlpha:0}, {autoAlpha:1, repeat:-1, yoyo:true});
}
function animateHandle() {
  var copyWidth = $p.outerWidth();
  var handleWidth = $handle.outerWidth();
  var targetX = Math.max(0, copyWidth - handleWidth);
  handleTL.to($handle, 0.7, {x: targetX, ease:SteppedEase.config(12)});
  handleTL.add(function(){ TweenMax.to($handle, 0.12, {autoAlpha:1}); });
}
</script>
</body>
</html>
