<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant SDK Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --green: #00ff41;
            --green-dim: #00cc33;
            --green-glow: rgba(0, 255, 65, 0.15);
            --green-glow-strong: rgba(0, 255, 65, 0.35);
            --bg: #0a0a0a;
            --bg-card: #0f0f0f;
            --bg-card2: #141414;
            --border: #1a1a1a;
            --border-green: rgba(0, 255, 65, 0.2);
            --text: #e0e0e0;
            --text-dim: #888;
            --text-dimmer: #444;
        }

        body {
            font-family: 'Consolas', 'Courier New', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── PARTICLES ── */
        #canvas-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ── LAYOUT ── */
        #app {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 300px 1fr;
            grid-template-rows: auto 1fr;
            min-height: 100vh;
        }

        /* ── HEADER ── */
        #header {
            grid-column: 1 / -1;
            padding: 20px 30px;
            border-bottom: 1px solid var(--border-green);
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 30px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        #header-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 220px;
        }

        #header h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--green);
            text-shadow: 0 0 20px var(--green-glow-strong);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #header .subtitle {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        #search-wrap {
            flex: 1;
            position: relative;
        }

        #search-wrap::before {
            content: '⌕';
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--green-dim);
            font-size: 18px;
            pointer-events: none;
        }

        #search {
            width: 100%;
            padding: 10px 16px 10px 42px;
            background: var(--bg-card2);
            border: 1px solid var(--border-green);
            border-radius: 6px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #search:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px var(--green-glow);
        }

        #search::placeholder {
            color: var(--text-dimmer);
        }

        #stats {
            font-size: 11px;
            color: var(--text-dim);
            white-space: nowrap;
        }

        #stats span {
            color: var(--green);
        }

        /* ── SIDEBAR ── */
        #sidebar {
            border-right: 1px solid var(--border-green);
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(10px);
            overflow-y: auto;
            height: calc(100vh - 65px);
            position: sticky;
            top: 65px;
        }

        #sidebar::-webkit-scrollbar { width: 4px; }
        #sidebar::-webkit-scrollbar-track { background: transparent; }
        #sidebar::-webkit-scrollbar-thumb { background: var(--border-green); border-radius: 2px; }

        .part-group {
            border-bottom: 1px solid var(--border);
        }

        .part-header {
            padding: 12px 16px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--green);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
            transition: background 0.15s;
        }

        .part-header:hover {
            background: var(--green-glow);
        }

        .part-header .count {
            font-size: 10px;
            color: var(--text-dim);
            font-weight: 400;
            letter-spacing: 0;
        }

        .part-header .arrow {
            font-size: 10px;
            color: var(--text-dim);
            transition: transform 0.2s;
        }

        .part-header.collapsed .arrow {
            transform: rotate(-90deg);
        }

        .file-list {
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .file-list.collapsed {
            max-height: 0 !important;
        }

        .file-item {
            padding: 7px 16px 7px 24px;
            font-size: 12px;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.1s, color 0.1s;
            border-left: 2px solid transparent;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-item:hover {
            background: var(--green-glow);
            color: var(--text);
            border-left-color: var(--green-dim);
        }

        .file-item.active {
            background: rgba(0,255,65,0.08);
            color: var(--green);
            border-left-color: var(--green);
        }

        .file-item.hidden {
            display: none;
        }

        .file-icon {
            font-size: 10px;
            color: var(--text-dimmer);
            flex-shrink: 0;
        }

        .file-size {
            margin-left: auto;
            font-size: 10px;
            color: var(--text-dimmer);
            flex-shrink: 0;
        }

        /* ── MAIN CONTENT ── */
        #main {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── WELCOME ── */
        #welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 40px;
            text-align: center;
        }

        #welcome .big-icon {
            font-size: 48px;
            filter: drop-shadow(0 0 20px var(--green-glow-strong));
        }

        #welcome h2 {
            font-size: 22px;
            color: var(--green);
            letter-spacing: 2px;
        }

        #welcome p {
            font-size: 13px;
            color: var(--text-dim);
            max-width: 400px;
            line-height: 1.7;
        }

        #welcome .hint {
            font-size: 11px;
            color: var(--text-dimmer);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 4px;
            letter-spacing: 1px;
        }

        /* ── FILE VIEWER ── */
        #viewer {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        #file-header {
            padding: 14px 24px;
            border-bottom: 1px solid var(--border-green);
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(10,10,10,0.95);
            flex-wrap: wrap;
            gap: 12px;
        }

        #file-path {
            font-size: 13px;
            color: var(--green);
            flex: 1;
            min-width: 0;
        }

        #file-path .part-crumb {
            color: var(--text-dim);
        }

        #file-path .sep {
            color: var(--text-dimmer);
            margin: 0 6px;
        }

        #file-meta {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .meta-badge {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 3px;
            border: 1px solid var(--border-green);
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .meta-badge.green {
            border-color: var(--green);
            color: var(--green);
        }

        #file-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 6px 14px;
            font-family: inherit;
            font-size: 11px;
            letter-spacing: 1px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border-green);
            color: var(--text-dim);
        }

        .btn-ghost:hover {
            border-color: var(--green);
            color: var(--green);
            box-shadow: 0 0 8px var(--green-glow);
        }

        .btn-green {
            background: rgba(0,255,65,0.1);
            border: 1px solid var(--green);
            color: var(--green);
        }

        .btn-green:hover {
            background: rgba(0,255,65,0.2);
            box-shadow: 0 0 12px var(--green-glow-strong);
        }

        /* ── INLINE SEARCH ── */
        #inline-search-bar {
            display: none;
            padding: 10px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-card);
            align-items: center;
            gap: 12px;
        }

        #inline-search-bar.visible {
            display: flex;
        }

        #inline-search {
            flex: 1;
            padding: 7px 12px;
            background: var(--bg-card2);
            border: 1px solid var(--border-green);
            border-radius: 4px;
            color: var(--text);
            font-family: inherit;
            font-size: 12px;
            outline: none;
        }

        #inline-search:focus {
            border-color: var(--green);
        }

        #inline-match-info {
            font-size: 11px;
            color: var(--text-dim);
            white-space: nowrap;
        }

		        /* ── SEARCH MODE BUTTON ── */
        #search-mode-btn {
            padding: 8px 14px;
            font-family: inherit;
            font-size: 10px;
            letter-spacing: 1px;
            border-radius: 4px;
            cursor: pointer;
            background: transparent;
            border: 1px solid var(--border-green);
            color: var(--text-dim);
            text-transform: uppercase;
            white-space: nowrap;
            transition: all 0.15s;
        }

        #search-mode-btn:hover {
            border-color: var(--green);
            color: var(--green);
        }

        #search-mode-btn.active-mode {
            background: rgba(0,255,65,0.1);
            border-color: var(--green);
            color: var(--green);
            box-shadow: 0 0 10px var(--green-glow);
        }

        /* ── GLOBAL RESULTS PANEL ── */
        #global-results {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }

        #global-results::-webkit-scrollbar { width: 4px; }
        #global-results::-webkit-scrollbar-track { background: transparent; }
        #global-results::-webkit-scrollbar-thumb {
            background: var(--border-green);
            border-radius: 2px;
        }

        .gr-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-green);
            flex-wrap: wrap;
            gap: 8px;
        }

        .gr-title {
            font-size: 13px;
            color: var(--text);
            letter-spacing: 1px;
        }

        .gr-query {
            color: var(--green);
            font-weight: 700;
        }

        .gr-sub {
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        /* result card */
        .gr-card {
            margin-bottom: 14px;
            border: 1px solid var(--border);
            border-radius: 5px;
            overflow: hidden;
            transition: border-color 0.15s;
        }

        .gr-card:hover { border-color: var(--border-green); }

        .gr-card-header {
            padding: 10px 16px;
            background: var(--bg-card2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background 0.15s;
            gap: 12px;
        }

        .gr-card-header:hover { background: rgba(0,255,65,0.06); }

        .gr-card-file {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            min-width: 0;
            overflow: hidden;
        }

        .gr-card-part {
            color: var(--text-dimmer);
            font-size: 11px;
            flex-shrink: 0;
        }

        .gr-card-sep {
            color: var(--text-dimmer);
            flex-shrink: 0;
        }

        .gr-card-name {
            color: var(--green);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .gr-card-count {
            font-size: 10px;
            color: var(--text-dim);
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 2px 8px;
            border-radius: 3px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* snippets */
        .gr-snippets {
            background: var(--bg-card);
            border-top: 1px solid var(--border);
        }

        .gr-snip {
            display: flex;
            align-items: baseline;
            gap: 12px;
            padding: 6px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.1s;
            overflow: hidden;
        }

        .gr-snip:last-child { border-bottom: none; }

        .gr-snip:hover { background: rgba(0,255,65,0.04); }

        .gr-ln {
            font-size: 10px;
            color: var(--text-dimmer);
            min-width: 36px;
            text-align: right;
            flex-shrink: 0;
            user-select: none;
        }

        .gr-line-code {
            font-size: 11px;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: 'Consolas', monospace;
        }

        mark.gr-mark {
            background: rgba(255,200,0,0.28);
            color: #ffd700;
            border-radius: 2px;
            padding: 0 1px;
        }

        .gr-more {
            padding: 6px 16px;
            font-size: 10px;
            color: var(--text-dimmer);
            letter-spacing: 1px;
            font-style: italic;
        }

        /* skip notice */
        .gr-skip {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 12px;
            margin-bottom: 6px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg-card);
            font-size: 11px;
        }

        .gr-skip-icon { color: #ffaa00; }

        .gr-skip-file {
            color: var(--text-dim);
            font-family: 'Consolas', monospace;
        }

        .gr-skip-reason { color: var(--text-dimmer); }

        /* empty state */
        .gr-empty {
            text-align: center;
            padding: 48px 24px;
            font-size: 13px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 10px;
        }

        /* ── CODE AREA ── */
        #code-wrap {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        #code-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
        #code-wrap::-webkit-scrollbar-track { background: var(--bg); }
        #code-wrap::-webkit-scrollbar-thumb { background: var(--border-green); border-radius: 3px; }

        #loading-bar {
            position: absolute;
            top: 0; left: 0;
            height: 2px;
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            transition: width 0.3s;
            z-index: 10;
        }

        #code-container {
            display: flex;
            min-height: 100%;
        }

        #line-numbers {
            padding: 20px 0;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            text-align: right;
            user-select: none;
            position: sticky;
            left: 0;
            z-index: 5;
            min-width: 52px;
        }

        .ln {
            display: block;
            padding: 0 12px;
            font-size: 12px;
            line-height: 20px;
            color: var(--text-dimmer);
            font-family: 'Consolas', monospace;
        }

        .ln.highlight-ln {
            background: rgba(0,255,65,0.08);
            color: var(--green-dim);
        }

        #code-content {
            flex: 1;
            padding: 20px 24px;
            overflow: visible;
        }

        #code-content pre {
            margin: 0;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 12px;
            line-height: 20px;
            color: var(--text);
            white-space: pre;
            tab-size: 4;
        }

        /* Syntax colors */
        .tok-kw   { color: #569cd6; }
        .tok-type { color: #4ec9b0; }
        .tok-str  { color: #ce9178; }
        .tok-num  { color: #b5cea8; }
        .tok-cmt  { color: #6a9955; font-style: italic; }
        .tok-pp   { color: #c586c0; }
        .tok-fn   { color: #dcdcaa; }

        mark.search-hit {
            background: rgba(255, 200, 0, 0.35);
            color: #ffd700;
            border-radius: 2px;
            padding: 0 1px;
        }

        mark.search-hit.active-hit {
            background: rgba(255, 140, 0, 0.5);
            color: #ffaa00;
            outline: 1px solid #ffaa00;
        }

        /* ── LOADING STATE ── */
        #load-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 16px;
            padding: 40px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 2px solid var(--border);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .load-text {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 2px;
        }

        /* ── ERROR STATE ── */
        #error-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 12px;
            padding: 40px;
            text-align: center;
        }

        .error-icon { font-size: 36px; }

        .error-title {
            font-size: 16px;
            color: #ff4444;
        }

        .error-msg {
            font-size: 12px;
            color: var(--text-dim);
            max-width: 400px;
            line-height: 1.7;
        }

        /* ── WELCOME ── */
        #welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 16px;
            padding: 40px;
            text-align: center;
        }

        .big-icon {
            font-size: 48px;
            filter: drop-shadow(0 0 20px var(--green-glow-strong));
            animation: pulse-icon 3s ease-in-out infinite;
        }

        @keyframes pulse-icon {
            0%, 100% { filter: drop-shadow(0 0 20px var(--green-glow-strong)); }
            50% { filter: drop-shadow(0 0 40px rgba(0,255,65,0.6)); }
        }

        #welcome h2 {
            font-size: 20px;
            color: var(--green);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        #welcome p {
            font-size: 12px;
            color: var(--text-dim);
            max-width: 380px;
            line-height: 1.8;
        }

        .hint-box {
            font-size: 11px;
            color: var(--text-dimmer);
            border: 1px solid var(--border);
            padding: 8px 18px;
            border-radius: 4px;
            letter-spacing: 1px;
            margin-top: 8px;
        }

        /* ── SIDEBAR ── */
        #sidebar {
            border-right: 1px solid var(--border-green);
            background: rgba(10,10,10,0.92);
            backdrop-filter: blur(10px);
            overflow-y: auto;
            height: calc(100vh - 61px);
            position: sticky;
            top: 61px;
        }

        #sidebar::-webkit-scrollbar { width: 3px; }
        #sidebar::-webkit-scrollbar-track { background: transparent; }
        #sidebar::-webkit-scrollbar-thumb {
            background: var(--border-green);
            border-radius: 2px;
        }

        .part-group { border-bottom: 1px solid var(--border); }

        .part-header {
            padding: 11px 16px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--green);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
            transition: background 0.15s;
        }

        .part-header:hover { background: var(--green-glow); }

        .part-header .ph-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .part-count {
            font-size: 10px;
            color: var(--text-dimmer);
            font-weight: 400;
            letter-spacing: 0;
        }

        .arrow {
            font-size: 9px;
            color: var(--text-dimmer);
            transition: transform 0.2s;
            display: inline-block;
        }

        .part-header.open .arrow { transform: rotate(90deg); }

        .file-list {
            overflow: hidden;
            transition: max-height 0.25s ease;
            max-height: 0;
        }

        .file-list.open { max-height: 9999px; }

        .file-item {
            padding: 6px 14px 6px 22px;
            font-size: 11px;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: background 0.1s, color 0.1s, border-left-color 0.1s;
            border-left: 2px solid transparent;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-item:hover {
            background: var(--green-glow);
            color: var(--text);
            border-left-color: var(--green-dim);
        }

        .file-item.active {
            background: rgba(0,255,65,0.07);
            color: var(--green);
            border-left-color: var(--green);
        }

        .file-item.hidden { display: none; }

        .file-ext {
            font-size: 9px;
            color: var(--text-dimmer);
            background: var(--bg-card2);
            border: 1px solid var(--border);
            padding: 1px 4px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .file-name-text {
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .file-size-label {
            font-size: 9px;
            color: var(--text-dimmer);
            flex-shrink: 0;
            margin-left: auto;
        }

        /* ── MAIN ── */
        #main {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: calc(100vh - 61px);
        }

        /* ── FILE HEADER ── */
        #file-header {
            display: none;
            padding: 12px 22px;
            border-bottom: 1px solid var(--border-green);
            background: rgba(10,10,10,0.97);
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        #file-header.visible { display: flex; }

        #file-path {
            flex: 1;
            font-size: 12px;
            min-width: 0;
        }

        .crumb-part { color: var(--text-dim); }
        .crumb-sep { color: var(--text-dimmer); margin: 0 5px; }
        .crumb-file { color: var(--green); }

        .badge {
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 3px;
            border: 1px solid var(--border);
            color: var(--text-dimmer);
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .badge.green {
            border-color: rgba(0,255,65,0.4);
            color: var(--green-dim);
        }

        .file-actions { display: flex; gap: 8px; }

        .btn {
            padding: 6px 13px;
            font-family: inherit;
            font-size: 10px;
            letter-spacing: 1px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border-green);
            color: var(--text-dim);
        }

        .btn-ghost:hover {
            border-color: var(--green);
            color: var(--green);
            box-shadow: 0 0 8px var(--green-glow);
        }

        .btn-green {
            background: rgba(0,255,65,0.08);
            border: 1px solid rgba(0,255,65,0.4);
            color: var(--green);
        }

        .btn-green:hover {
            background: rgba(0,255,65,0.18);
            box-shadow: 0 0 12px var(--green-glow-strong);
        }

        /* ── INLINE SEARCH ── */
        #inline-bar {
            display: none;
            padding: 8px 22px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-card);
            align-items: center;
            gap: 10px;
        }

        #inline-bar.visible { display: flex; }

        #inline-input {
            flex: 1;
            padding: 6px 11px;
            background: var(--bg-card2);
            border: 1px solid var(--border-green);
            border-radius: 4px;
            color: var(--text);
            font-family: inherit;
            font-size: 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        #inline-input:focus { border-color: var(--green); }

        #inline-info {
            font-size: 11px;
            color: var(--text-dim);
            white-space: nowrap;
            min-width: 80px;
        }

        /* ── CODE AREA ── */
        #code-wrap {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        #code-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
        #code-wrap::-webkit-scrollbar-track { background: var(--bg); }
        #code-wrap::-webkit-scrollbar-thumb {
            background: var(--border-green);
            border-radius: 3px;
        }

        #code-container {
            display: flex;
            min-height: 100%;
        }

        #line-numbers {
            padding: 18px 0;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            text-align: right;
            user-select: none;
            position: sticky;
            left: 0;
            z-index: 5;
            min-width: 50px;
        }

        .ln {
            display: block;
            padding: 0 10px;
            font-size: 11px;
            line-height: 19px;
            color: var(--text-dimmer);
            font-family: 'Consolas', monospace;
        }

        .ln.hl { background: rgba(0,255,65,0.06); color: var(--green-dim); }

        #code-content {
            flex: 1;
            padding: 18px 22px;
        }

        #code-content pre {
            margin: 0;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 12px;
            line-height: 19px;
            color: var(--text);
            white-space: pre;
            tab-size: 4;
        }

        /* Syntax tokens */
        .kw   { color: #569cd6; }
        .ty   { color: #4ec9b0; }
        .str  { color: #ce9178; }
        .num  { color: #b5cea8; }
        .cmt  { color: #6a9955; font-style: italic; }
        .pp   { color: #c586c0; }
        .fn   { color: #dcdcaa; }
        .op   { color: #d4d4d4; }

        mark.hit {
            background: rgba(255,200,0,0.28);
            color: #ffd700;
            border-radius: 2px;
            padding: 0 1px;
        }

        mark.hit.cur {
            background: rgba(255,140,0,0.5);
            color: #ffb300;
            outline: 1px solid #ffaa00;
        }

        /* ── PROGRESS BAR ── */
        #progress {
            position: fixed;
            top: 0; left: 0;
            height: 2px;
            width: 0%;
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            z-index: 9999;
            transition: width 0.2s, opacity 0.4s;
            pointer-events: none;
        }

        /* ── CANVAS PARTICLES ── */
        canvas#canvas-bg { display: block; }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            #app { grid-template-columns: 1fr; }
            #sidebar {
                height: auto;
                max-height: 220px;
                position: relative;
                top: 0;
                border-right: none;
                border-bottom: 1px solid var(--border-green);
            }
            #header { flex-wrap: wrap; }
            #header-brand { min-width: unset; }
        }
    </style>
</head>

//  PARTICLES
// ═══════════════════════════════════════════════════════════
(function() {
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function rand(a, b) { return a + Math.random() * (b - a); }

    function createParticle() {
        return {
            x: rand(0, W),
            y: rand(0, H),
            r: rand(1, 2.5),
            vx: rand(-0.15, 0.15),
            vy: rand(-0.25, -0.05),
            alpha: rand(0.1, 0.5),
            pulse: rand(0, Math.PI * 2),
            pulseSpeed: rand(0.01, 0.03)
        };
    }

    function init() {
        resize();
        particles = [];
        const count = Math.floor((W * H) / 12000);
        for (let i = 0; i < count; i++) particles.push(createParticle());
    }

    function drawConnections() {
        const maxDist = 120;
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < maxDist) {
                    const alpha = (1 - dist / maxDist) * 0.08;
                    ctx.beginPath();
                    ctx.strokeStyle = `rgba(0,255,65,${alpha})`;
                    ctx.lineWidth = 0.5;
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.stroke();
                }
            }
        }
    }

    function animate() {
        ctx.clearRect(0, 0, W, H);
        drawConnections();
        for (let p of particles) {
            p.pulse += p.pulseSpeed;
            const pulsedAlpha = p.alpha * (0.6 + 0.4 * Math.sin(p.pulse));
            const pulsedR = p.r * (0.85 + 0.15 * Math.sin(p.pulse));
            const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, pulsedR * 4);
            grd.addColorStop(0, `rgba(0,255,65,${pulsedAlpha})`);
            grd.addColorStop(1, `rgba(0,255,65,0)`);
            ctx.beginPath();
            ctx.arc(p.x, p.y, pulsedR * 4, 0, Math.PI * 2);
            ctx.fillStyle = grd;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(p.x, p.y, pulsedR, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0,255,65,${pulsedAlpha * 2})`;
            ctx.fill();
            p.x += p.vx;
            p.y += p.vy;
            if (p.y < -10) { p.y = H + 10; p.x = rand(0, W); }
            if (p.x < -10) p.x = W + 10;
            if (p.x > W + 10) p.x = -10;
        }
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', init);
    init();
    animate();
})();

function rawUrl(part, file) {
    return `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${part}/${file}`;

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
function fmtSize(bytes) {
    if (bytes < 1024)    return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
}

function escHtml(s) {
    return s
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
}

function setProgress(pct, hide) {
    const bar = document.getElementById('progress');
    bar.style.width   = pct + '%';
    bar.style.opacity = '1';
    if (hide) setTimeout(() => {
        bar.style.opacity = '0';
        bar.style.width   = '0%';
    }, 400);
}

function showState(which) {
    document.getElementById('welcome').style.display     = which === 'welcome' ? 'flex' : 'none';
    document.getElementById('load-state').style.display  = which === 'loading' ? 'flex' : 'none';
    document.getElementById('error-state').style.display = which === 'error'   ? 'flex' : 'none';
    document.getElementById('code-wrap').style.display   = which === 'viewer'  ? 'block': 'none';
    document.getElementById('global-results').style.display = which === 'global' ? 'block' : 'none';
    const fh = document.getElementById('file-header');
    if (which === 'viewer') fh.classList.add('visible');
    else fh.classList.remove('visible');
    if (which !== 'viewer') closeInlineSearch();
}

let searchDebounce = null;

document.getElementById('search').addEventListener('input', function() {
    const q = this.value.trim();
    clearTimeout(searchDebounce);

    if (searchMode === 'name') {
        filterSidebarByName(q);
    } else {
        if (!q) {
            clearGlobalResults();
            restoreSidebar();

        }
        searchDebounce = setTimeout(() => globalContentSearch(q), 400);
    }

function filterSidebarByName(q) {
    const lq    = q.toLowerCase();
    const items = document.querySelectorAll('.file-item');
    const groups = document.querySelectorAll('.part-group');

    items.forEach(item => {
        const name = item.dataset.file.toLowerCase();
        item.classList.toggle('hidden', !!(q && !name.includes(lq)));
    });

    if (q) {
        groups.forEach(group => {
            group.querySelector('.part-header').classList.add('open');
            group.querySelector('.file-list').classList.add('open');
        });
    }

    groups.forEach(group => {
        const visible = group.querySelectorAll('.file-item:not(.hidden)').length;
        group.style.display = visible === 0 ? 'none' : '';
    });
}

function restoreSidebar() {
    document.querySelectorAll('.file-item').forEach(i => i.classList.remove('hidden'));
    document.querySelectorAll('.part-group').forEach(g => g.style.display = '');
}

// ═══════════════════════════════════════════════════════════
//  GLOBAL CONTENT SEARCH
// ═══════════════════════════════════════════════════════════
async function globalContentSearch(query) {
    // cancel any in-progress search
    if (searchAbort) searchAbort.abort();
    searchAbort = new AbortController();
    const signal = searchAbort.signal;

    const lq = query.toLowerCase();

    // show results panel
    showState('global');
    const container = document.getElementById('global-results');
    container.innerHTML = `
        <div class="gr-header">
            <span class="gr-title">⌕ Searching all files for <span class="gr-query">"${escHtml(query)}"</span></span>
            <span class="gr-sub" id="gr-progress-text">0 / ${FILES.length} files scanned</span>
        </div>
        <div id="gr-list"></div>`;

    const grList     = document.getElementById('gr-list');
    const grProgress = document.getElementById('gr-progress-text');

    let scanned  = 0;
    let matched  = 0;
    let aborted  = false;

    // skip huge files (>5MB) by default to keep it fast, warn user
    const SKIP_THRESHOLD = 5 * 1024 * 1024;

    for (const [part, file, size] of FILES) {
        if (signal.aborted) { aborted = true; break; }

        scanned++;
        grProgress.textContent = `${scanned} / ${FILES.length} files scanned · ${matched} matches`;

        // skip very large files
        if (size > SKIP_THRESHOLD) {
            const skipEl = document.createElement('div');
            skipEl.className = 'gr-skip';
            skipEl.innerHTML = `<span class="gr-skip-icon">⚡</span> <span class="gr-skip-file">${escHtml(file)}</span> <span class="gr-skip-reason">skipped — ${fmtSize(size)} (too large)</span>`;
            grList.appendChild(skipEl);
            continue;
        }

        try {
            const res = await fetch(rawUrl(part, file), { signal });
            if (!res.ok) continue;
            const text = await res.text();
            if (signal.aborted) { aborted = true; break; }

            const lines   = text.split('\n');
            const matches = [];

            lines.forEach((line, idx) => {
                if (line.toLowerCase().includes(lq)) {
                    matches.push({ lineNum: idx + 1, line });
                }
            });

            if (matches.length === 0) continue;
            matched++;

            // build result card
            const card = document.createElement('div');
            card.className = 'gr-card';

            const cardHeader = document.createElement('div');
            cardHeader.className = 'gr-card-header';
            cardHeader.innerHTML = `
                <span class="gr-card-file">
                    <span class="gr-card-part">${part}</span>
                    <span class="gr-card-sep">/</span>
                    <span class="gr-card-name">${escHtml(file)}</span>
                </span>
                <span class="gr-card-count">${matches.length} match${matches.length !== 1 ? 'es' : ''}</span>`;

            // clicking header opens the file
            cardHeader.addEventListener('click', () => {
                const item = document.querySelector(`.file-item[data-file="${file}"][data-part="${part}"]`);
                loadFile(part, file, size, item);
                // after load, open inline search with query
                setTimeout(() => {
                    openInlineSearch();
                    document.getElementById('inline-input').value = query;
                    applyInlineSearch(query);
                }, 800);
            });

            const snippets = document.createElement('div');
            snippets.className = 'gr-snippets';

            // show up to 5 snippet lines
            const shown = matches.slice(0, 5);
            for (const m of shown) {
                const snip = document.createElement('div');
                snip.className = 'gr-snip';

                const lineStr  = escHtml(m.line.trim());
                const llineStr = lineStr.toLowerCase();
                const lqe      = escHtml(query).toLowerCase();
                const highlighted = lineStr.replace(
                    new RegExp(escHtml(query).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'),
                    match => `<mark class="gr-mark">${match}</mark>`
                );

                snip.innerHTML = `<span class="gr-ln">${m.lineNum}</span><span class="gr-line-code">${highlighted}</span>`;

                // clicking snippet opens file and jumps to that line
                snip.addEventListener('click', () => {
                    const item = document.querySelector(`.file-item
					                    [data-file="${file}"][data-part="${part}"]`);
                    loadFile(part, file, size, item).then(() => {
                        setTimeout(() => {
                            openInlineSearch();
                            document.getElementById('inline-input').value = query;
                            applyInlineSearch(query);
                            // scroll to specific line
                            const lnEl = document.getElementById(`ln-${m.lineNum}`);
                            if (lnEl) lnEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }, 600);
                    });
                });

                snippets.appendChild(snip);
            }

            if (matches.length > 5) {
                const more = document.createElement('div');
                more.className = 'gr-more';
                more.textContent = `+ ${matches.length - 5} more matches — click file to open`;
                snippets.appendChild(more);
            }

            card.appendChild(cardHeader);
            card.appendChild(snippets);
            grList.appendChild(card);

        } catch (err) {
            if (err.name === 'AbortError') { aborted = true; break; }
            // silently skip fetch errors per file
        }
    }

    if (!aborted) {
        grProgress.textContent = `Done · ${FILES.length} files scanned · ${matched} file${matched !== 1 ? 's' : ''} matched`;
        if (matched === 0) {
            grList.innerHTML = `<div class="gr-empty">No matches found for <span class="gr-query">"${escHtml(query)}"</span></div>`;
        }
    }
}

    document.getElementById('global-results').style.display = 'none';

const KEYWORDS = new Set([
    'alignas','alignof','and','and_eq','asm','auto','bitand','bitor','bool',
    'break','case','catch','char','char8_t','char16_t','char32_t','class',
    'compl','concept','const','consteval','constexpr','constinit','const_cast',
    'continue','co_await','co_return','co_yield','decltype','default','delete',
    'do','double','dynamic_cast','else','enum','explicit','export','extern',
    'false','float','for','friend','goto','if','inline','int','long','mutable',
    'namespace','new','noexcept','not','not_eq','nullptr','operator','or',
    'or_eq','private','protected','public','register','reinterpret_cast',
    'requires','return','short','signed','sizeof','static','static_assert',
    'static_cast','struct','switch','template','this','thread_local','throw',
    'true','try','typedef','typeid','typename','union','unsigned','using',
    'virtual','void','volatile','wchar_t','while','xor','xor_eq','override',
    'final','FORCEINLINE','UPROPERTY','UFUNCTION','UCLASS','USTRUCT','UENUM',
    'GENERATED_BODY','TEXT','TArray','TMap','TSet','TWeakObjectPtr',
    'TSubclassOf','FString','FName','FText','UObject','AActor','UActorComponent'
]);

const TYPES = new Set([
    'int8_t','int16_t','int32_t','int64_t',
    'uint8_t','uint16_t','uint32_t','uint64_t',
    'size_t','ptrdiff_t','intptr_t','uintptr_t',
    'FVector','FVector2D','FVector4','FRotator','FQuat','FTransform',
    'FLinearColor','FColor','FBox','FSphere','FPlane','FMatrix',
    'TOptional','TSharedPtr','TSharedRef','TUniquePtr','TWeakPtr',
    'ENetRole','ECollisionChannel','EObjectFlags'
]);

function highlightCpp(raw) {
    const lines = raw.split('\n');
    const out   = [];

    for (let line of lines) {
        const cmtIdx = line.indexOf('//');
        let codePart = line, cmtPart = '';
        if (cmtIdx !== -1) {
            codePart = line.slice(0, cmtIdx);
            cmtPart  = line.slice(cmtIdx);
        }

        const trimmed = codePart.trimStart();
        if (trimmed.startsWith('#')) {
            const escaped    = escHtml(codePart);
            const escapedCmt = cmtPart ? `<span class="cmt">${escHtml(cmtPart)}</span>` : '';
            out.push(`<span class="pp">${escaped}</span>${escapedCmt}`);
            continue;
        }

        let result = '';
        const tokens = codePart.split(/(\b\w+\b|"[^"]*"|'[^']*'|\s+|[^\w\s"']+)/g).filter(Boolean);
        for (let tok of tokens) {
            if (!tok) continue;
            if ((tok.startsWith('"') && tok.endsWith('"')) ||
                (tok.startsWith("'") && tok.endsWith("'"))) {
                result += `<span class="str">${escHtml(tok)}</span>`;
            } else if (/^-?\d+(\.\d+)?([uUlLfF]*)$/.test(tok) || /^0x[0-9a-fA-F]+$/.test(tok)) {
                result += `<span class="num">${escHtml(tok)}</span>`;
            } else if (KEYWORDS.has(tok)) {
                result += `<span class="kw">${escHtml(tok)}</span>`;
            } else if (TYPES.has(tok)) {
                result += `<span class="ty">${escHtml(tok)}</span>`;
            } else if (/^[A-Z][A-Za-z0-9_]*$/.test(tok) && tok.length > 1) {
                result += `<span class="ty">${escHtml(tok)}</span>`;
            } else if (/^[a-z_][a-zA-Z0-9_]*$/.test(tok)) {
                result += `<span class="fn">${escHtml(tok)}</span>`;
            } else {
                result += escHtml(tok);
            }
        }

        const escapedCmt = cmtPart ? `<span class="cmt">${escHtml(cmtPart)}</span>` : '';
        out.push(result + escapedCmt);
    }

    return out.join('\n');
}

function buildSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.innerHTML = '';

    const parts = {};
    for (const [part, file, size] of FILES) {
        if (!parts[part]) parts[part] = [];
        parts[part].push([file, size]);
    }

    for (const [part, files] of Object.entries(parts)) {
        const group = document.createElement('div');
        group.className = 'part-group';
        group.dataset.part = part;

        const header = document.createElement('div');
        header.className = 'part-header open';
        header.innerHTML = `
            <span>${part.toUpperCase()}</span>
            <span class="ph-right">
                <span class="part-count">${files.length} files</span>
                <span class="arrow">▶</span>
            </span>`;
        header.addEventListener('click', () => togglePart(header, list));

        const list = document.createElement('div');
        list.className = 'file-list open';

        for (const [file, size] of files) {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.dataset.file = file;
            item.dataset.part = part;
            item.dataset.size = size;
            item.innerHTML = `
                <span class="file-ext">.H</span>
                <span class="file-name-text">${file.replace(/\.h$/i, '')}</span>
                <span class="file-size-label">${fmtSize(size)}</span>`;
            item.addEventListener('click', () => loadFile(part, file, size, item));
            list.appendChild(item);
        }

        group.appendChild(header);
        group.appendChild(list);
        sidebar.appendChild(group);
    }
}

function togglePart(header, list) {
    const isOpen = header.classList.contains('open');
    if (isOpen) {
        header.classList.remove('open');
        list.classList.remove('open');
    } else {
        header.classList.add('open');
        list.classList.add('open');
    }
}

// ═══════════════════════════════════════════════════════════
//  LOAD FILE
// ═══════════════════════════════════════════════════════════
async function loadFile(part, file, size, itemEl) {
    document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
    if (itemEl) itemEl.classList.add('active');

    currentFile  = file;
    currentPart  = part;
    rawContent   = '';
    hitNodes     = [];
    hitIndex     = 0;

    showState('loading');
    setProgress(20);

    const url = rawUrl(part, file);

    try {
        setProgress(50);
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
        setProgress(80);
        const text = await res.text();
        rawContent = text;
        setProgress(100, true);
        renderFile(file, part, size, text);
        return text;
    } catch (err) {
        setProgress(100, true);
        document.getElementById('error-msg').textContent =
            `Could not fetch: ${url}\n\nError: ${err.message}\n\nMake sure your repository is public and the path is correct.`;
        showState('error');
        throw err;
    }
}

function renderFile(file, part, size, text) {
    const lines = text.split('\n');

    document.getElementById('crumb-part').textContent = part;
    document.getElementById('crumb-file').textContent = file;
    document.getElementById('badge-lines').textContent = lines.length.toLocaleString() + ' lines';
    document.getElementById('badge-size').textContent  = fmtSize(size);

    const lnContainer = document.getElementById('line-numbers');
    lnContainer.innerHTML = '';
    const lnFrag = document.createDocumentFragment();
    for (let i = 1; i <= lines.length; i++) {
        const span = document.createElement('span');
        span.className   = 'ln';
        span.id          = `ln-${i}`;
        span.textContent = i;
        lnFrag.appendChild(span);
    }
    lnContainer.appendChild(lnFrag);

    const highlighted = highlightCpp(text);
    document.getElementById('code-pre').innerHTML = highlighted;

    showState('viewer');
    document.getElementById('code-wrap').scrollTop = 0;

    if (inlineVisible) {
        const q = document.getElementById('inline-input').value;
        if (q) applyInlineSearch(q);
    }
}

// ═══════════════════════════════════════════════════════════
//  INLINE SEARCH
// ═══════════════════════════════════════════════════════════
function toggleInlineSearch() {
    inlineVisible ? closeInlineSearch() : openInlineSearch();
}

function openInlineSearch() {
    inlineVisible = true;
    document.getElementById('inline-bar').classList.add('visible');
    document.getElementById('inline-input').focus();
}

function closeInlineSearch() {
    inlineVisible = false;
    document.getElementById('inline-bar').classList.remove('visible');
    clearHits();
    document.getElementById('inline-info').textContent = '0 / 0';
}

document.getElementById('inline-input').addEventListener('input', function() {
    applyInlineSearch(this.value.trim());
});

document.getElementById('inline-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.shiftKey ? prevHit() : nextHit(); }
    if (e.key === 'Escape') closeInlineSearch();
});

function clearHits() {
    const pre   = document.getElementById('code-pre');
    const marks = pre.querySelectorAll('mark.hit');
    marks.forEach(m => {
        m.parentNode.replaceChild(document.createTextNode(m.textContent), m);
        m.parentNode.normalize();
    });
    hitNodes = [];
    hitIndex = 0;
    document.querySelectorAll('.ln.hl').forEach(l => l.classList.remove('hl'));
}

function applyInlineSearch(query) {
    clearHits();
    if (!query) {
        document.getElementById('inline-info').textContent = '0 / 0';
        return;
    }

    const pre  = document.getElementById('code-pre');
    const lq   = query.toLowerCase();
    const walker = document.createTreeWalker(pre, NodeFilter.SHOW_TEXT, null);
    const textNodes = [];
    let node;
    while ((node = walker.nextNode())) textNodes.push(node);

    for (const tn of textNodes) {
        const val  = tn.nodeValue;
        const lval = val.toLowerCase();
        let idx    = lval.indexOf(lq);
        if (idx === -1) continue;

        const frag = document.createDocumentFragment();
        let last   = 0;
        while (idx !== -1) {
            if (idx > last) frag.appendChild(document.createTextNode(val.slice(last, idx)));
            const mark       = document.createElement('mark');
            mark.className   = 'hit';
            mark.textContent = val.slice(idx, idx + query.length);
            frag.appendChild(mark);
            hitNodes.push(mark);
            last = idx + query.length;
            idx  = lval.indexOf(lq, last);
        }
        if (last < val.length) frag.appendChild(document.createTextNode(val.slice(last)));
        tn.parentNode.replaceChild(frag, tn);
    }

    hitIndex = 0;
    updateHitInfo();
    if (hitNodes.length > 0) scrollToHit(0);
}

function updateHitInfo() {
    const info = document.getElementById('inline-info');
    info.textContent = hitNodes.length === 0 ? '0 / 0' : `${hitIndex + 1} / ${hitNodes.length}`;
}

function scrollToHit(idx) {
    if (hitNodes.length === 0) return;
    hitNodes.forEach(m => m.classList.remove('cur'));
    hitNodes[idx].classList.add('cur');
    hitNodes[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
    document.querySelectorAll('.ln.hl').forEach(l => l.classList.remove('hl'));
    const wrap    = document.getElementById('code-wrap');
    const wrapTop = wrap.getBoundingClientRect().top;
    const rect    = hitNodes[idx].getBoundingClientRect();
    const lineH   = 19;
    const scrollT = wrap.scrollTop;
    const relTop  = rect.top - wrapTop + scrollT - 18;
    const lineNum = Math.round(relTop / lineH) + 1;
    const lnEl    = document.getElementById(`ln-${lineNum}`);
    if (lnEl) lnEl.classList.add('hl');
}

function nextHit() {
    if (hitNodes.length === 0) return;
    hitIndex = (hitIndex + 1) % hitNodes.length;
    updateHitInfo();
    scrollToHit(hitIndex);
}

function prevHit() {
    if (hitNodes.length === 0) return;
    hitIndex = (hitIndex - 1 + hitNodes.length) % hitNodes.length;
    updateHitInfo();
    scrollToHit(hitIndex);
}

function openRaw() {
    if (!currentFile) return;
    window.open(rawUrl(currentPart, currentFile), '_blank');

function copyRawUrl() {
    if (!currentFile) return;
    const url = rawUrl(currentPart, currentFile);
    navigator.clipboard.writeText(url).then(() => {
        const btn = document.querySelector('[onclick="copyRawUrl()"]');
        const orig = btn.textContent;
        btn.textContent = '✓ COPIED';
        btn.style.color = 'var(--green)';
        setTimeout(() => {
            btn.textContent = orig;
            btn.style.color = '';
        }, 1500);
    });
}

// keyboard shortcuts
document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'f' && currentFile) {
        e.preventDefault();
        openInlineSearch();
    }
    if (e.key === 'Escape' && inlineVisible) closeInlineSearch();
});
